name: Anthropic News Summary
# Updated: 2026-03-07

on:
  schedule:
    # Run daily at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back (default: 3)'
        required: false
        default: '3'
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: write
  pages: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run Anthropic News Summary
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          DEBUG: ${{ github.event.inputs.debug || 'false' }}
          INFOGRAPHIC_BASE_URL: ${{ vars.INFOGRAPHIC_BASE_URL }}
        run: |
          python run.py --days ${{ github.event.inputs.days || '3' }}

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain reports/ infographic/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/ infographic/
          git commit -m "docs(reports): add reports for $(date +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: generate-reports
    runs-on: ubuntu-latest
    if: always() && needs.generate-reports.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare public directory
        run: |
          mkdir -p public

          # Generate index.html with card grid layout
          cat > public/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthropic News Infographic Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #FFF8F0, #F5EDE4);
      font-family: 'Zen Kurenaido', sans-serif;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 24px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 32px; margin-bottom: 8px; color: #D4A574; }
    .subtitle { color: #666; margin-bottom: 32px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      border-left: 4px solid #D4A574;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card a {
      display: block;
      padding: 20px;
      text-decoration: none;
      color: inherit;
    }
    .card-date {
      font-size: 12px;
      color: #D4A574;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .card-file {
      font-size: 11px;
      color: #888;
      font-family: monospace;
    }
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #888;
      border-top: 2px dashed #D4A574;
      padding-top: 20px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      grid-column: 1 / -1;
    }
    .empty-state p { margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Anthropic News Infographic Gallery</h1>
    <p class="subtitle">Anthropic ニュースレポートのインフォグラフィック一覧</p>
    <div class="grid" id="grid"></div>
    <footer>
      <p>Updated daily via GitHub Actions</p>
    </footer>
  </div>
  <script>
    const colors = ['#D4A574', '#C49A6C', '#B89064'];
    fetch('reports.json')
      .then(r => r.json())
      .then(reports => {
        const grid = document.getElementById('grid');
        if (reports.length === 0) {
          grid.innerHTML = '<div class="empty-state"><p>まだインフォグラフィックがありません</p></div>';
          return;
        }
        reports.forEach((r, i) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.borderLeftColor = colors[i % 3];
          card.innerHTML = '<a href="' + r.infographic + '">' +
            '<div class="card-date">' + r.date + '</div>' +
            '<div class="card-title">' + r.title + '</div>' +
            '<div class="card-file">' + r.infographic + '</div>' +
            '</a>';
          grid.appendChild(card);
        });
      });
  </script>
</body>
</html>
          HTMLEOF

          # Generate reports.json (infographics only)
          echo "[" > public/reports.json
          first=true
          for file in $(ls -r infographic/*.html 2>/dev/null | grep -v index.html); do
            filename=$(basename "$file")
            date=$(echo "$filename" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
            # Get title from HTML title tag
            title=$(grep -oP '(?<=<title>)[^<]+' "$file" 2>/dev/null | head -1)
            if [ -z "$title" ]; then
              # Fallback: get from report file
              report_file="reports/2*/${filename%.html}.md"
              for rf in $report_file; do
                if [ -f "$rf" ]; then
                  title=$(head -1 "$rf" | sed 's/^# //')
                  break
                fi
              done
            fi
            if [ -z "$title" ]; then
              title=$(echo "$filename" | sed 's/^[0-9-]*-//' | sed 's/\.html$//' | tr '-' ' ')
            fi

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> public/reports.json
            fi

            echo "{\"date\":\"$date\",\"title\":\"$title\",\"infographic\":\"$filename\"}" >> public/reports.json
          done
          echo "]" >> public/reports.json

          # Copy infographic files only
          cp infographic/*.html public/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
