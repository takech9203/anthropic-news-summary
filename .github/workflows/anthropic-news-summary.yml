name: Anthropic News Summary

on:
  schedule:
    # Run daily at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back (default: 3)'
        required: false
        default: '3'
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: write
  pages: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run Anthropic News Summary
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          DEBUG: ${{ github.event.inputs.debug || 'false' }}
          INFOGRAPHIC_BASE_URL: ${{ vars.INFOGRAPHIC_BASE_URL }}
        run: |
          python run.py --days ${{ github.event.inputs.days || '3' }}

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain reports/ infographic/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/ infographic/
          git commit -m "docs(reports): add reports for $(date +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: generate-reports
    runs-on: ubuntu-latest
    if: always() && needs.generate-reports.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare public directory
        run: |
          mkdir -p public

          # Generate main index.html
          cat > public/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Anthropic News Summary</title>
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
              <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Zen Maru Gothic', sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      padding: 40px 20px;
                  }
                  .container {
                      max-width: 1000px;
                      margin: 0 auto;
                  }
                  header {
                      text-align: center;
                      color: white;
                      margin-bottom: 40px;
                  }
                  header h1 {
                      font-size: 2.5rem;
                      margin-bottom: 10px;
                  }
                  header p {
                      opacity: 0.9;
                  }
                  .section {
                      background: white;
                      border-radius: 20px;
                      padding: 30px;
                      margin-bottom: 30px;
                      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                  }
                  .section h2 {
                      color: #764ba2;
                      margin-bottom: 20px;
                      padding-bottom: 10px;
                      border-bottom: 3px solid #667eea;
                  }
                  .report-list {
                      list-style: none;
                  }
                  .report-list li {
                      padding: 15px;
                      border-bottom: 1px solid #eee;
                      display: flex;
                      align-items: center;
                      gap: 15px;
                  }
                  .report-list li:last-child {
                      border-bottom: none;
                  }
                  .report-list .date {
                      background: #667eea;
                      color: white;
                      padding: 5px 12px;
                      border-radius: 15px;
                      font-size: 0.85rem;
                      min-width: 100px;
                      text-align: center;
                  }
                  .report-list a {
                      color: #333;
                      text-decoration: none;
                      flex: 1;
                  }
                  .report-list a:hover {
                      color: #764ba2;
                  }
                  .report-list .links {
                      display: flex;
                      gap: 10px;
                  }
                  .report-list .links a {
                      background: #f0f0f0;
                      padding: 5px 12px;
                      border-radius: 10px;
                      font-size: 0.85rem;
                  }
                  .report-list .links a:hover {
                      background: #667eea;
                      color: white;
                  }
                  footer {
                      text-align: center;
                      color: white;
                      opacity: 0.8;
                      margin-top: 20px;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <header>
                      <h1>Anthropic News Summary</h1>
                      <p>Anthropic の最新ニュースを日本語でまとめています</p>
                  </header>
                  <div class="section">
                      <h2>Infographics</h2>
                      <ul class="report-list" id="report-list">
                      </ul>
                  </div>
                  <footer>
                      <p>Updated daily via GitHub Actions</p>
                  </footer>
              </div>
              <script>
                  fetch('reports.json')
                      .then(r => r.json())
                      .then(reports => {
                          const list = document.getElementById('report-list');
                          reports.filter(r => r.infographic).forEach(r => {
                              const li = document.createElement('li');
                              li.innerHTML = `
                                  <span class="date">${r.date}</span>
                                  <span style="flex:1">${r.title}</span>
                                  <a href="${r.infographic}" class="links" style="background:#667eea;color:white;padding:5px 12px;border-radius:10px;font-size:0.85rem;text-decoration:none;">Infographic</a>
                              `;
                              list.appendChild(li);
                          });
                      });
              </script>
          </body>
          </html>
          HTMLEOF

          # Generate reports.json (infographics only)
          echo "[" > public/reports.json
          first=true
          for file in $(ls -r infographic/*.html 2>/dev/null | grep -v index.html); do
            filename=$(basename "$file")
            date=$(echo "$filename" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
            # Get title from corresponding report if exists
            report_file="reports/2*/${filename%.html}.md"
            title=""
            for rf in $report_file; do
              if [ -f "$rf" ]; then
                title=$(head -1 "$rf" | sed 's/^# //')
                break
              fi
            done
            if [ -z "$title" ]; then
              title=$(echo "$filename" | sed 's/^[0-9-]*-//' | sed 's/\.html$//' | tr '-' ' ')
            fi

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> public/reports.json
            fi

            echo "{\"date\":\"$date\",\"title\":\"$title\",\"infographic\":\"$filename\"}" >> public/reports.json
          done
          echo "]" >> public/reports.json

          # Copy infographic files only
          cp infographic/*.html public/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
