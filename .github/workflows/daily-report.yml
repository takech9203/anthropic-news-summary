name: Daily Anthropic News Report

on:
  schedule:
    # 毎日 UTC 0:00 (JST 9:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back'
        required: false
        default: '2'

permissions:
  contents: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run report generator
        env:
          AWS_REGION: us-east-1
          VERBOSE: '1'
        run: |
          python run.py --days ${{ github.event.inputs.days || '7' }}

      - name: Commit and push reports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/ infographic/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(reports): add reports for $(date +%Y-%m-%d)"
            git push
          fi
          # Note: GitHub Pages deployment is automatically triggered by deploy-pages.yml on push
